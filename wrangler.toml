name = "connect-four-main"
compatibility_date = "2025-06-14"

# Static site: the app is 100% client-side (the Rust/WASM AI runs in the
# browser), so this is an assets-only Worker — no server code, no cold starts.
[assets]
directory = "./out"

[[routes]]
pattern = "connect-4.tre.systems/*"
zone_name = "tre.systems"
